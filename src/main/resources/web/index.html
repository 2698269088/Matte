<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Matte 商城 - 商品购买</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            margin: 0;
        }
        body.custom-bg {
            background: none;
        }
        body.custom-bg::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
        }
        .container {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 40px 0;
            color: white;
            position: relative;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .user-bar {
            position: absolute;
            top: 20px;
            right: 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .user-bar button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        .user-bar button:hover {
            background: rgba(255,255,255,0.4);
        }
        .user-info {
            color: white;
            font-size: 0.95em;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .category-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9em;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            padding: 10px;
        }
        .product-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .product-desc {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-price {
            font-size: 1.4em;
            color: #e74c3c;
            font-weight: bold;
        }
        .product-price span {
            font-size: 0.7em;
        }
        .product-stock {
            font-size: 0.85em;
            color: #27ae60;
        }
        .product-stock.low {
            color: #e67e22;
        }
        .product-stock.out {
            color: #e74c3c;
        }
        .cart-row {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            align-items: center;
        }
        .cart-row input[type="number"] {
            width: 60px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 1em;
        }
        .cart-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .cart-btn:hover {
            opacity: 0.9;
        }
        .cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .cart-icon-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }
        .cart-icon-btn:hover {
            transform: scale(1.1);
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            font-size: 0.7em;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .cart-modal .modal {
            max-width: 700px;
            width: 95%;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .cart-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            background: #f0f0f0;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .cart-item-price {
            color: #e74c3c;
            font-size: 0.95em;
        }
        .cart-item input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
        }
        .cart-item input[type="number"].price-input {
            width: 80px;
        }
        .cart-total {
            text-align: right;
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #e74c3c;
            border-top: 2px solid #eee;
        }
        .cart-actions {
            display: flex;
            gap: 10px;
            padding: 0 20px 20px;
        }
        .cart-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .message.success {
            background: #27ae60;
        }
        .message.error {
            background: #e74c3c;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9em;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        .form-group input[type="checkbox"] {
            width: auto;
            padding: 0;
            border: none;
            border-radius: 0;
            margin-right: 5px;
            vertical-align: middle;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .modal-buttons button:hover {
            opacity: 0.9;
        }
        .tab-nav {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab-nav button {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab-nav button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .address-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .address-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
        }
        .address-item .default-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .address-item .addr-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        .address-item .addr-actions button {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            font-size: 0.85em;
            cursor: pointer;
        }
        .addr-actions .btn-set-default {
            background: #e8f5e9;
            color: #27ae60;
        }
        .addr-actions .btn-delete {
            background: #ffebee;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <button class="cart-icon-btn" onclick="showModal('cartModal'); loadCart();">
        🛒
        <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
    </button>

    <div class="container">
        <header>
            <div class="user-bar" id="userBar">
                <button onclick="showModal('loginModal')">登录</button>
                <button onclick="showModal('registerModal')">注册</button>
            </div>
            <h1 id="shopTitle">Matte 商城</h1>
            <p id="shopSlogan">精选好物，品质生活</p>

        </header>
        <div id="products">
            <div class="loading">正在加载商品...</div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>用户登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="hideModal('loginModal')">取消</button>
                <button class="btn-primary" onclick="doLogin()">登录</button>
            </div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <h2>用户注册</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="3-20位字符">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="至少6位">
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" id="regPhone" placeholder="选填">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="选填">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="hideModal('registerModal')">取消</button>
                <button class="btn-primary" onclick="doRegister()">注册</button>
            </div>
        </div>
    </div>

    <!-- 购物车弹窗 -->
    <div class="modal-overlay cart-modal" id="cartModal">
        <div class="modal">
            <h2>我的购物车</h2>
            <div id="cartItems">
                <div style="text-align:center; color:#999; padding:40px;">购物车为空</div>
            </div>
            <div class="cart-total" id="cartTotal">合计: ¥0.00</div>
            <div class="form-group" style="padding: 0 20px;">
                <label>选择派送商家 <span style="color:red;">*</span></label>
                <select id="checkoutMerchant" style="width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:1em;">
                    <option value="">请选择商家</option>
                </select>
            </div>
            <div class="form-group" style="padding: 0 20px;">
                <label>选择收货地址 <span style="color:red;">*</span></label>
                <select id="checkoutAddress" style="width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:1em;">
                    <option value="">请选择收货地址</option>
                </select>
                <button class="btn-secondary" style="margin-top:8px; padding:6px 12px; font-size:0.85em;" onclick="hideModal('cartModal'); showModal('addressModal'); loadAddresses();">管理收货地址</button>
            </div>
            <div class="cart-actions">
                <button class="btn-secondary" onclick="hideModal('cartModal')">继续购物</button>
                <button class="btn-primary" onclick="checkout()">立即结算</button>
            </div>
        </div>
    </div>

    <!-- 付款弹窗 -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal" style="max-width: 400px;">
            <h2>扫码付款</h2>
            <div style="text-align:center; padding:20px;">
                <p style="color:#666; margin-bottom:15px;">请使用微信/支付宝扫描下方二维码完成付款</p>
                <div id="paymentQrContainer">
                    <div style="color:#999; padding:20px;">未设置付款二维码</div>
                </div>
                <div style="margin-top:15px; font-size:1.2em; color:#e74c3c; font-weight:bold;" id="paymentAmount"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="hideModal('paymentModal')">取消</button>
                <button class="btn-primary" onclick="confirmPayment()">我已完成付款</button>
            </div>
        </div>
    </div>

    <!-- 地址管理弹窗 -->
    <div class="modal-overlay" id="addressModal">
        <div class="modal" style="max-width: 500px;">
            <h2>收货地址管理</h2>
            <div class="tab-nav">
                <button class="active" onclick="switchTab('addrListTab', this)">我的地址</button>
                <button onclick="switchTab('addrAddTab', this)">新增地址</button>
            </div>
            <div class="tab-content active" id="addrListTab">
                <div class="address-list" id="addressList">
                    <div class="loading" style="color:#666; padding:20px;">加载中...</div>
                </div>
            </div>
            <div class="tab-content" id="addrAddTab">
                <div class="form-group">
                    <label>收货人姓名 <span style="color:red;">*</span></label>
                    <input type="text" id="addrName" placeholder="请输入收货人姓名">
                </div>
                <div class="form-group">
                    <label>联系方式 <span style="color:red;">*</span></label>
                    <input type="text" id="addrPhone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label>收货地址 <span style="color:red;">*</span></label>
                    <input type="text" id="addrFull" placeholder="请输入完整收货地址（包含省市区街道门牌号等）">
                </div>
                <div class="form-group" style="display: flex; align-items: center;">
                    <input type="checkbox" id="addrDefault">
                    <label for="addrDefault" style="margin-bottom: 0; margin-left: 5px;">设为默认地址</label>
                </div>
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="hideModal('addressModal')">关闭</button>
                    <button class="btn-primary" onclick="doAddAddress()">保存地址</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadProducts() {
            try {
                const [productsRes, categoriesRes] = await Promise.all([
                    fetch('/api/products'),
                    fetch('/api/categories')
                ]);
                const products = await productsRes.json();
                const categoriesResult = await categoriesRes.json();
                const categories = categoriesResult.success ? categoriesResult.data : [];
                renderProductsByCategory(products, categories);
            } catch (error) {
                document.getElementById('products').innerHTML = 
                    '<div class="loading">加载失败，请刷新页面重试</div>';
            }
        }

        function renderProductsByCategory(products, categories) {
            const container = document.getElementById('products');
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="loading">暂无商品</div>';
                return;
            }

            // 按分区分组
            const grouped = {};
            products.forEach(p => {
                const catId = p.categoryId || 0;
                if (!grouped[catId]) grouped[catId] = [];
                grouped[catId].push(p);
            });

            // 获取分区名称
            const catNames = { 0: '全部商品' };
            categories.forEach(c => catNames[c.id] = c.name);

            let html = '';
            // 按分区顺序渲染
            const sortedCatIds = [0, ...categories.map(c => c.id).filter(id => id !== 0)];
            sortedCatIds.forEach(catId => {
                if (!grouped[catId] || grouped[catId].length === 0) return;
                html += `<div class="category-section" style="margin-bottom:30px;">
                    <h2 style="color:white; margin-bottom:15px; padding-left:10px; border-left:4px solid rgba(255,255,255,0.5);">${catNames[catId] || '其他'}</h2>
                    <div class="products-grid">`;
                html += grouped[catId].map(product => renderProductCard(product)).join('');
                html += '</div></div>';
            });

            container.innerHTML = html;
        }

        function renderProductCard(product) {
            const stockClass = product.stock === 0 ? 'out' : product.stock < 10 ? 'low' : '';
            const stockText = product.stock === 0 ? '已售罄' : `库存: ${product.stock}件`;
            const btnDisabled = product.stock === 0 ? 'disabled' : '';
            const btnText = product.stock === 0 ? '暂时缺货' : '立即购买';
            
            return `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${product.imagePath || ''}" alt="${product.name}" 
                             onerror="this.parentElement.innerHTML='<span style=\\'font-size:0.9em;\\'>${product.name}</span>'">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-desc">${product.description}</div>
                        <div class="product-footer">
                            <div class="product-price"><span>¥</span>${product.price.toFixed(2)}</div>
                            <div class="product-stock ${stockClass}">${stockText}</div>
                        </div>
                        <div class="cart-row">
                            <input type="number" id="qty-${product.id}" value="1" min="1" max="${product.stock}" ${btnDisabled}>
                            <button class="cart-btn" onclick="addToCart(${product.id})" ${btnDisabled}>
                                加入购物车
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function addToCart(productId) {
            if (!currentUser) {
                showMessage('请先登录', 'error');
                showModal('loginModal');
                return;
            }
            const qtyInput = document.getElementById('qty-' + productId);
            const quantity = parseInt(qtyInput.value) || 1;
            try {
                const response = await fetch('/api/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Bearer ' + currentUser.token },
                    body: `userId=${currentUser.userId}&productId=${productId}&quantity=${quantity}`
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    updateCartBadge();
                }
            } catch (error) {
                showMessage('加入购物车失败', 'error');
            }
        }

        async function loadCart() {
            if (!currentUser) return;
            try {
                const response = await fetch(`/api/cart/${currentUser.userId}`, {
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });
                const result = await response.json();
                if (result.success) {
                    renderCart(result.data);
                    updateCartBadge(result.data.length);
                    loadCheckoutOptions();
                }
            } catch (e) {
                document.getElementById('cartItems').innerHTML =
                    '<div style="text-align:center; color:#999; padding:40px;">加载失败</div>';
            }
        }

        async function loadCheckoutOptions() {
            // 加载商家列表
            try {
                const merchantRes = await fetch('/api/merchants');
                const merchantResult = await merchantRes.json();
                const merchantSelect = document.getElementById('checkoutMerchant');
                if (merchantResult.success && merchantResult.data) {
                    let html = '<option value="">请选择商家</option>';
                    merchantResult.data.forEach(m => {
                        html += `<option value="${m.id}">${m.name}${m.phone ? ' (' + m.phone + ')' : ''}</option>`;
                    });
                    merchantSelect.innerHTML = html;
                }
            } catch (e) {
                console.error('加载商家失败', e);
            }

            // 加载收货地址
            try {
                const addrRes = await fetch(`/api/addresses/${currentUser.userId}`, {
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });
                const addrResult = await addrRes.json();
                const addrSelect = document.getElementById('checkoutAddress');
                if (addrResult.success && addrResult.data && addrResult.data.length > 0) {
                    let html = '<option value="">请选择收货地址</option>';
                    addrResult.data.forEach(a => {
                        const addrText = `${a.receiverName} ${a.phone} - ${a.province}${a.city}${a.district || ''}${a.detail}${a.isDefault ? ' [默认]' : ''}`;
                        html += `<option value="${a.id}">${addrText}</option>`;
                    });
                    addrSelect.innerHTML = html;
                } else {
                    addrSelect.innerHTML = '<option value="">暂无收货地址，请先添加</option>';
                }
            } catch (e) {
                console.error('加载地址失败', e);
            }
        }

        function renderCart(items) {
            const container = document.getElementById('cartItems');
            if (!items || items.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#999; padding:40px;">购物车为空</div>';
                document.getElementById('cartTotal').textContent = '合计: ¥0.00';
                return;
            }
            let total = 0;
            let html = '';
            items.forEach(item => {
                const price = item.customPrice != null ? item.customPrice : item.price;
                const subtotal = price * item.quantity;
                total += subtotal;
                html += `<div class="cart-item" data-id="${item.id}">
                    <img src="${item.imagePath || ''}" alt="" onerror="this.style.display='none'">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.productName}</div>
                        <div class="cart-item-price">单价: ¥${price.toFixed(2)} x ${item.quantity}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="font-size:0.85em; color:#666;">数量:</label>
                        <input type="number" value="${item.quantity}" min="1" max="${item.stock}" onchange="updateCartQty(${item.id}, this.value)">
                        <label style="font-size:0.85em; color:#666;">价格:</label>
                        <input type="number" class="price-input" value="${price.toFixed(2)}" step="0.01" min="0" onchange="updateCartPrice(${item.id}, this.value)">
                        <button class="btn-danger" style="padding:4px 10px; font-size:0.8em;" onclick="removeFromCart(${item.id})">删除</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById('cartTotal').textContent = '合计: ¥' + total.toFixed(2);
        }

        async function updateCartQty(cartId, quantity) {
            try {
                const response = await fetch(`/api/cart/${cartId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Bearer ' + currentUser.token },
                    body: `quantity=${quantity}`
                });
                const result = await response.json();
                if (result.success) {
                    loadCart();
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (e) {
                showMessage('更新失败', 'error');
            }
        }

        async function updateCartPrice(cartId, price) {
            try {
                const response = await fetch(`/api/cart/${cartId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Bearer ' + currentUser.token },
                    body: `customPrice=${price}`
                });
                const result = await response.json();
                if (result.success) {
                    loadCart();
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (e) {
                showMessage('更新失败', 'error');
            }
        }

        async function removeFromCart(cartId) {
            if (!confirm('确定要从购物车删除该商品吗？')) return;
            try {
                const response = await fetch(`/api/cart/${cartId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) loadCart();
            } catch (e) {
                showMessage('删除失败', 'error');
            }
        }

        let pendingCheckoutData = null;

        async function checkout() {
            if (!currentUser) {
                showMessage('请先登录', 'error');
                return;
            }
            const cartItems = document.querySelectorAll('.cart-item');
            if (cartItems.length === 0) {
                showMessage('购物车为空', 'error');
                return;
            }

            const merchantId = document.getElementById('checkoutMerchant').value;
            const addressId = document.getElementById('checkoutAddress').value;

            if (!merchantId) {
                showMessage('请选择派送商家', 'error');
                return;
            }
            if (!addressId) {
                showMessage('请选择收货地址', 'error');
                return;
            }

            const cartIds = Array.from(cartItems).map(el => el.dataset.id).join(',');
            const totalText = document.getElementById('cartTotal').textContent;

            // 保存结算数据，等待付款确认
            pendingCheckoutData = {
                userId: currentUser.userId,
                cartIds: cartIds,
                merchantId: merchantId,
                addressId: addressId
            };

            // 显示所选商家的收款二维码
            try {
                const qrRes = await fetch(`/api/merchants/${merchantId}/qr`);
                const qrResult = await qrRes.json();
                const container = document.getElementById('paymentQrContainer');
                if (qrResult.success && qrResult.data.qrPath) {
                    container.innerHTML = `<img src="${qrResult.data.qrPath}" style="max-width:250px; max-height:250px; border-radius:8px; border:1px solid #ddd;">`;
                } else {
                    container.innerHTML = '<div style="color:#999; padding:20px;">该商家尚未设置收款二维码</div>';
                }
                document.getElementById('paymentAmount').textContent = totalText;
                hideModal('cartModal');
                showModal('paymentModal');
            } catch (e) {
                showMessage('加载付款二维码失败', 'error');
            }
        }

        async function confirmPayment() {
            if (!pendingCheckoutData) {
                showMessage('结算数据异常', 'error');
                return;
            }

            try {
                const response = await fetch('/api/cart/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Bearer ' + currentUser.token },
                    body: `userId=${pendingCheckoutData.userId}&cartIds=${pendingCheckoutData.cartIds}&merchantId=${pendingCheckoutData.merchantId}&addressId=${pendingCheckoutData.addressId}`
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    hideModal('paymentModal');
                    pendingCheckoutData = null;
                    loadCart();
                    loadProducts();
                }
            } catch (e) {
                showMessage('结算失败', 'error');
            }
        }

        async function updateCartBadge(count) {
            const badge = document.getElementById('cartBadge');
            if (count !== undefined) {
                badge.textContent = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
                return;
            }
            if (!currentUser) {
                badge.style.display = 'none';
                return;
            }
            try {
                const response = await fetch(`/api/cart/${currentUser.userId}`, {
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });
                const result = await response.json();
                const cnt = result.success && result.data ? result.data.length : 0;
                badge.textContent = cnt;
                badge.style.display = cnt > 0 ? 'flex' : 'none';
            } catch (e) {
                badge.style.display = 'none';
            }
        }

        function showMessage(text, type) {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }

        // ===== 用户相关 =====
        let currentUser = JSON.parse(localStorage.getItem('matte_user') || 'null');

        function updateUserBar() {
            const bar = document.getElementById('userBar');
            if (currentUser) {
                bar.innerHTML = `
                    <span class="user-info">欢迎，${currentUser.username}</span>
                    <button onclick="showModal('cartModal'); loadCart();">购物车</button>
                    <button onclick="showModal('addressModal'); loadAddresses();">地址管理</button>
                    <button onclick="window.location.href='/admin.html'">管理员入口</button>
                    <button onclick="doLogout()">退出</button>
                `;
                updateCartBadge();
            } else {
                bar.innerHTML = `
                    <button onclick="showModal('loginModal')">登录</button>
                    <button onclick="showModal('registerModal')">注册</button>
                    <button onclick="window.location.href='/admin.html'">管理员入口</button>
                `;
                document.getElementById('cartBadge').style.display = 'none';
            }
        }

        function showModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function hideModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        async function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();

            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&phone=${encodeURIComponent(phone)}&email=${encodeURIComponent(email)}`
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    hideModal('registerModal');
                    currentUser = { userId: result.userId, username: result.username, token: result.token };
                    localStorage.setItem('matte_user', JSON.stringify(currentUser));
                    updateUserBar();
                }
            } catch (e) {
                showMessage('注册失败', 'error');
            }
        }

        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    hideModal('loginModal');
                    currentUser = { userId: result.userId, username: result.username, phone: result.phone, email: result.email, token: result.token };
                    localStorage.setItem('matte_user', JSON.stringify(currentUser));
                    updateUserBar();
                }
            } catch (e) {
                showMessage('登录失败', 'error');
            }
        }

        function doLogout() {
            currentUser = null;
            localStorage.removeItem('matte_user');
            updateUserBar();
            showMessage('已退出登录', 'success');
        }

        // ===== 地址相关 =====
        async function loadAddresses() {
            if (!currentUser) return;
            try {
                const response = await fetch(`/api/addresses/${currentUser.userId}`, {
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });
                const result = await response.json();
                const list = document.getElementById('addressList');
                if (result.success && result.data.length > 0) {
                    list.innerHTML = result.data.map(addr => `
                        <div class="address-item">
                            <strong>${addr.receiverName}</strong> ${addr.phone}
                            ${addr.isDefault ? '<span class="default-tag">默认</span>' : ''}
                            <div style="color:#666; margin-top:5px; font-size:0.9em;">
                                ${addr.province} ${addr.city} ${addr.district || ''} ${addr.detail}
                            </div>
                            <div class="addr-actions">
                                ${!addr.isDefault ? `<button class="btn-set-default" onclick="setDefaultAddress(${addr.id})">设为默认</button>` : ''}
                                <button class="btn-delete" onclick="deleteAddress(${addr.id})">删除</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div style="text-align:center; color:#999; padding:30px;">暂无收货地址</div>';
                }
            } catch (e) {
                document.getElementById('addressList').innerHTML = '<div style="text-align:center; color:#999; padding:30px;">加载失败</div>';
            }
        }

        async function doAddAddress() {
            if (!currentUser) {
                showMessage('请先登录', 'error');
                return;
            }
            const receiverName = document.getElementById('addrName').value.trim();
            const phone = document.getElementById('addrPhone').value.trim();
            const fullAddress = document.getElementById('addrFull').value.trim();
            const isDefault = document.getElementById('addrDefault').checked;

            if (!receiverName) {
                showMessage('请填写收货人姓名', 'error');
                return;
            }
            if (!phone) {
                showMessage('请填写联系方式', 'error');
                return;
            }
            if (!fullAddress) {
                showMessage('请填写收货地址', 'error');
                return;
            }

            // 将完整地址拆分为省市区和详细地址（简单处理，按逗号或空格分隔）
            const addrParts = fullAddress.split(/[,，]/);
            let province = addrParts[0] ? addrParts[0].trim() : '';
            let city = addrParts.length > 1 ? addrParts[1].trim() : '';
            let district = addrParts.length > 2 ? addrParts[2].trim() : '';
            let detail = addrParts.length > 3 ? addrParts.slice(3).join(',').trim() : '';
            
            // 如果拆分不够，将剩余部分放入详细地址
            if (detail === '' && district !== '') {
                detail = district;
                district = '';
            }
            if (detail === '' && city !== '') {
                detail = city;
                city = '';
            }

            try {
                const response = await fetch('/api/address', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Bearer ' + currentUser.token },
                    body: `userId=${currentUser.userId}&receiverName=${encodeURIComponent(receiverName)}&phone=${encodeURIComponent(phone)}&province=${encodeURIComponent(province)}&city=${encodeURIComponent(city)}&district=${encodeURIComponent(district)}&detail=${encodeURIComponent(detail)}&isDefault=${isDefault}`
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    document.getElementById('addrName').value = '';
                    document.getElementById('addrPhone').value = '';
                    document.getElementById('addrFull').value = '';
                    document.getElementById('addrDefault').checked = false;
                    switchTab('addrListTab', document.querySelector('.tab-nav button'));
                    loadAddresses();
                }
            } catch (e) {
                showMessage('添加失败', 'error');
            }
        }

        async function setDefaultAddress(addressId) {
            try {
                const response = await fetch(`/api/address/${addressId}/default`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) loadAddresses();
            } catch (e) {
                showMessage('设置失败', 'error');
            }
        }

        async function deleteAddress(addressId) {
            if (!confirm('确定要删除这个地址吗？')) return;
            try {
                const response = await fetch(`/api/address/${addressId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });
                const result = await response.json();
                showMessage(result.message, result.success ? 'success' : 'error');
                if (result.success) loadAddresses();
            } catch (e) {
                showMessage('删除失败', 'error');
            }
        }

        // 点击弹窗外部关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });

        async function loadShopSettings() {
            try {
                const response = await fetch('/api/settings');
                const result = await response.json();
                if (result.success) {
                    const data = result.data;
                    if (data.pageTitle) {
                        document.getElementById('pageTitle').textContent = data.pageTitle + ' - 商品购买';
                        document.getElementById('shopTitle').textContent = data.pageTitle;
                    }
                    if (data.slogan) {
                        document.getElementById('shopSlogan').textContent = data.slogan;
                    }
                    if (data.bgImage) {
                        document.body.classList.add('custom-bg');
                        const style = document.createElement('style');
                        style.textContent = `body.custom-bg::before { background-image: url('${data.bgImage}'); }`;
                        document.head.appendChild(style);
                    }
                }
            } catch (e) {
                console.error('加载商城设置失败', e);
            }
        }

        updateUserBar();
        loadShopSettings();
        loadProducts();
        if (currentUser) updateCartBadge();
    </script>
</body>
</html>
