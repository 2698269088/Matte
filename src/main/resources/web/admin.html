<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matte 商城 - 管理员后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center; padding: 30px 0; color: white; position: relative;
        }
        header h1 { font-size: 2em; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .user-bar {
            position: absolute; top: 10px; right: 0;
            display: flex; gap: 10px; align-items: center;
        }
        .user-bar button {
            padding: 8px 16px; border: none; border-radius: 20px;
            background: rgba(255,255,255,0.2); color: white;
            cursor: pointer; font-size: 0.9em; transition: background 0.3s;
        }
        .user-bar button:hover { background: rgba(255,255,255,0.4); }
        .panel {
            background: white; border-radius: 16px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .panel h2 {
            margin-bottom: 20px; color: #333; font-size: 1.3em;
            border-bottom: 2px solid #eee; padding-bottom: 10px;
        }
        .tab-nav {
            display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #eee;
        }
        .tab-nav button {
            flex: 1; padding: 12px; border: none; background: none;
            cursor: pointer; font-size: 1em; color: #666;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
            transition: all 0.3s;
        }
        .tab-nav button.active {
            color: #667eea; border-bottom-color: #667eea; font-weight: bold;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-primary {
            padding: 10px 20px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-size: 0.95em; cursor: pointer; transition: opacity 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger {
            padding: 6px 12px; border: none; border-radius: 6px;
            background: #e74c3c; color: white; font-size: 0.85em;
            cursor: pointer; transition: opacity 0.3s;
        }
        .btn-danger:hover { opacity: 0.9; }
        .btn-success {
            padding: 6px 12px; border: none; border-radius: 6px;
            background: #27ae60; color: white; font-size: 0.85em;
            cursor: pointer; transition: opacity 0.3s;
        }
        .btn-success:hover { opacity: 0.9; }
        .btn-warning {
            padding: 6px 12px; border: none; border-radius: 6px;
            background: #f39c12; color: white; font-size: 0.85em;
            cursor: pointer; transition: opacity 0.3s;
        }
        .btn-warning:hover { opacity: 0.9; }
        .btn-info {
            padding: 6px 12px; border: none; border-radius: 6px;
            background: #3498db; color: white; font-size: 0.85em;
            cursor: pointer; transition: opacity 0.3s;
        }
        .btn-info:hover { opacity: 0.9; }
        table {
            width: 100%; border-collapse: collapse; margin-top: 15px;
        }
        th, td {
            padding: 12px; text-align: left; border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa; font-weight: 600; color: #555; font-size: 0.9em;
        }
        tr:hover { background: #f8f9fa; }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; margin-bottom: 5px; color: #555; font-size: 0.9em;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 1em;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: #667eea;
        }
        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 30px;
            width: 90%; max-width: 500px; max-height: 90vh;
            overflow-y: auto; animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal h2 { margin-bottom: 20px; color: #333; text-align: center; }
        .modal-buttons {
            display: flex; gap: 10px; margin-top: 20px;
        }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .product-img {
            width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
            background: #f0f0f0;
        }
        .message {
            position: fixed; top: 20px; right: 20px; padding: 15px 25px;
            border-radius: 8px; color: white; font-weight: bold;
            z-index: 3000; animation: slideIn 0.3s ease;
        }
        .message.success { background: #27ae60; }
        .message.error { background: #e74c3c; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .status-pending { color: #e67e22; font-weight: bold; }
        .status-shipping { color: #3498db; font-weight: bold; }
        .status-delivered { color: #27ae60; font-weight: bold; }
        .status-disabled { color: #e74c3c; font-weight: bold; }
        .status-locked { color: #9b59b6; font-weight: bold; }
        .empty-state {
            text-align: center; padding: 40px; color: #999;
        }
        .login-panel {
            max-width: 400px; margin: 100px auto;
        }
        .file-input {
            width: 100%; padding: 10px; border: 1px solid #ddd;
            border-radius: 8px; background: #f8f9fa; cursor: pointer;
        }
    </style>
</head>
<body>
<div id="loginView">
    <div class="container">
        <div class="panel login-panel">
            <h2 style="text-align:center; margin-bottom:25px; color:#333;">管理员登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入管理员用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="btn-primary" style="width:100%;" onclick="doAdminLogin()">登录</button>
            <p style="text-align:center; margin-top:15px; color:#666; font-size:0.9em;">
                <a href="/" style="color:#667eea; text-decoration:none;">返回商城首页</a>
            </p>
        </div>
    </div>
</div>

<div id="adminView" style="display:none;">
    <div class="container">
        <header>
            <div class="user-bar">
                <span class="user-info" id="adminName" style="color:white; font-size:0.95em;"></span>
                <button onclick="doLogout()">退出</button>
            </div>
            <h1>Matte 商城管理后台</h1>
        </header>

        <div class="panel">
            <div class="tab-nav">
                <button class="active" onclick="switchTab('productsTab', this)">商品管理</button>
                <button onclick="switchTab('categoriesTab', this)">分区管理</button>
                <button onclick="switchTab('ordersTab', this)">订单管理</button>
                <button onclick="switchTab('usersTab', this)">用户管理</button>
                <button onclick="switchTab('merchantsTab', this)">商家管理</button>
                <button onclick="switchTab('settingsTab', this)">页面设置</button>
            </div>

            <div class="tab-content active" id="productsTab">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="color:#555;">商品列表</h3>
                    <button class="btn-primary" onclick="showAddProductModal()">+ 添加商品</button>
                </div>
                <div id="productsTable">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="tab-content" id="categoriesTab">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="color:#555;">分区列表</h3>
                    <button class="btn-primary" onclick="showAddCategoryModal()">+ 添加分区</button>
                </div>
                <div id="categoriesTable">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="tab-content" id="ordersTab">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="color:#555;">订单列表</h3>
                    <button class="btn-primary" onclick="loadOrders()">刷新</button>
                </div>
                <div id="ordersTable">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="tab-content" id="usersTab">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="color:#555;">用户列表</h3>
                    <button class="btn-primary" onclick="loadUsers()">刷新</button>
                </div>
                <div id="usersTable">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="tab-content" id="merchantsTab">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="color:#555;">商家列表</h3>
                    <button class="btn-primary" onclick="showAddMerchantModal()">+ 添加商家</button>
                </div>
                <div id="merchantsTable">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="tab-content" id="settingsTab">
                <h3 style="color:#555; margin-bottom:20px;">商城页面设置</h3>
                <div class="form-group">
                    <label>页面标题</label>
                    <input type="text" id="settingPageTitle" placeholder="如: Matte 商城">
                </div>
                <div class="form-group">
                    <label>标题语（副标题）</label>
                    <input type="text" id="settingSlogan" placeholder="如: 精选好物，品质生活">
                </div>
                <div class="form-group">
                    <label>商城背景图片</label>
                    <input type="file" id="settingBgFile" class="file-input" accept="image/*" onchange="previewSettingBg(this)">
                    <small style="color:#999; font-size:0.8em;">支持 JPG、PNG 格式</small>
                    <div id="settingBgPreview" style="margin-top:10px; display:none;">
                        <img id="settingBgImg" style="max-width:300px; max-height:200px; border-radius:8px; border:1px solid #ddd;">
                    </div>
                    <input type="hidden" id="settingBgImage" value="">
                </div>
                <div class="form-group">
                    <label>付款二维码</label>
                    <input type="file" id="settingPaymentQrFile" class="file-input" accept="image/*" onchange="previewPaymentQr(this)">
                    <small style="color:#999; font-size:0.8em;">支持 JPG、PNG 格式，用户结算时将显示此二维码进行付款</small>
                    <div id="settingPaymentQrPreview" style="margin-top:10px; display:none;">
                        <img id="settingPaymentQrImg" style="max-width:200px; max-height:200px; border-radius:8px; border:1px solid #ddd;">
                    </div>
                    <input type="hidden" id="settingPaymentQr" value="">
                </div>
                <div style="margin-top:25px;">
                    <button class="btn-primary" onclick="saveSettings()" style="width:150px;">保存设置</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑分区弹窗 -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal">
        <h2 id="categoryModalTitle">添加分区</h2>
        <input type="hidden" id="editCategoryId">
        <div class="form-group">
            <label>分区名称 *</label>
            <input type="text" id="catName" placeholder="如: 数码产品">
        </div>
        <div class="form-group">
            <label>排序号</label>
            <input type="number" id="catSortOrder" placeholder="0" value="0">
        </div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="hideModal('categoryModal')">取消</button>
            <button class="btn-primary" onclick="saveCategory()">保存</button>
        </div>
    </div>
</div>

<!-- 添加/编辑商家弹窗 -->
<div class="modal-overlay" id="merchantModal">
    <div class="modal">
        <h2 id="merchantModalTitle">添加商家</h2>
        <input type="hidden" id="editMerchantId">
        <div class="form-group">
            <label>商家名称 *</label>
            <input type="text" id="merchantName" placeholder="请输入商家名称">
        </div>
        <div class="form-group">
            <label>联系电话</label>
            <input type="text" id="merchantPhone" placeholder="请输入联系电话">
        </div>
        <div class="form-group">
            <label>商家地址</label>
            <input type="text" id="merchantAddress" placeholder="请输入商家地址">
        </div>
        <div class="form-group">
            <label>收款二维码</label>
            <input type="file" id="merchantQrFile" class="file-input" accept="image/*" onchange="previewMerchantQr(this)">
            <small style="color:#999; font-size:0.8em;">支持 JPG、PNG 格式</small>
            <div id="merchantQrPreview" style="margin-top:10px; display:none;">
                <img id="merchantQrImg" style="max-width:200px; max-height:200px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <input type="hidden" id="merchantQrPath" value="">
        </div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="hideModal('merchantModal')">取消</button>
            <button class="btn-primary" onclick="saveMerchant()">保存</button>
        </div>
    </div>
</div>

<!-- 添加/编辑商品弹窗 -->
<div class="modal-overlay" id="productModal">
    <div class="modal">
        <h2 id="productModalTitle">添加商品</h2>
        <input type="hidden" id="editProductId">
        <div class="form-group">
            <label>所属分区</label>
            <select id="prodCategory" style="width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:1em;">
                <option value="0">默认分区</option>
            </select>
        </div>
        <div class="form-group">
            <label>商品名称 *</label>
            <input type="text" id="prodName" placeholder="请输入商品名称">
        </div>
        <div class="form-group">
            <label>商品描述</label>
            <textarea id="prodDesc" rows="2" placeholder="请输入商品描述"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>价格 *</label>
                <input type="number" id="prodPrice" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>库存</label>
                <input type="number" id="prodStock" placeholder="0">
            </div>
        </div>
        <div class="form-group">
            <label>商品图片</label>
            <input type="file" id="prodImageFile" class="file-input" accept="image/*" onchange="previewImage(this)">
            <small style="color:#999; font-size:0.8em;">支持 JPG、PNG、GIF 格式，建议尺寸 400x400</small>
            <div id="imagePreview" style="margin-top:10px; display:none;">
                <img id="previewImg" style="max-width:200px; max-height:150px; border-radius:8px; border:1px solid #ddd;">
                <p id="imageInfo" style="color:#666; font-size:0.85em; margin-top:5px;"></p>
            </div>
            <input type="hidden" id="prodImage" value="">
        </div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="hideModal('productModal')">取消</button>
            <button class="btn-primary" onclick="saveProduct()">保存</button>
        </div>
    </div>
</div>

<script>
    let currentAdmin = JSON.parse(localStorage.getItem('matte_admin') || 'null');

    // 封装带认证头的请求函数
    async function authFetch(url, options = {}) {
        options.headers = options.headers || {};
        if (currentAdmin && currentAdmin.token) {
            options.headers['Authorization'] = 'Bearer ' + currentAdmin.token;
        }
        const response = await fetch(url, options);
        // 如果返回 401 或 403，说明认证失败，清除本地状态并返回登录页
        if (response.status === 401 || response.status === 403) {
            currentAdmin = null;
            localStorage.removeItem('matte_admin');
            showLoginView();
            const result = await response.json();
            showMessage(result.message || '登录已过期，请重新登录', 'error');
            throw new Error('Unauthorized');
        }
        return response;
    }

    function init() {
        if (currentAdmin && currentAdmin.admin && currentAdmin.token) {
            showAdminView();
        } else {
            showLoginView();
        }
    }

    function showLoginView() {
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('adminView').style.display = 'none';
    }

    function showAdminView() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('adminView').style.display = 'block';
        document.getElementById('adminName').textContent = '管理员: ' + currentAdmin.username;
        loadProducts();
        loadCategories();
        loadOrders();
        loadUsers();
        loadMerchants();
        loadSettings();
    }

    async function doAdminLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            showMessage('请填写用户名和密码', 'error');
            return;
        }

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            });
            const result = await response.json();

            if (result.success && result.admin) {
                currentAdmin = { userId: result.userId, username: result.username, admin: true, token: result.token };
                localStorage.setItem('matte_admin', JSON.stringify(currentAdmin));
                showAdminView();
                showMessage('管理员登录成功', 'success');
            } else if (result.success && !result.admin) {
                showMessage('该用户不是管理员', 'error');
            } else {
                showMessage(result.message, 'error');
            }
        } catch (e) {
            showMessage('登录失败', 'error');
        }
    }

    async function doLogout() {
        try {
            await authFetch('/api/logout', { method: 'POST' });
        } catch (e) {}
        currentAdmin = null;
        localStorage.removeItem('matte_admin');
        showLoginView();
        showMessage('已退出登录', 'success');
    }

    let categoriesList = [];

    async function loadCategories() {
        try {
            const response = await fetch('/api/categories');
            const result = await response.json();
            if (result.success) {
                categoriesList = result.data;
                renderCategories(result.data);
                updateCategorySelect(result.data);
            }
        } catch (e) {
            document.getElementById('categoriesTable').innerHTML =
                '<div class="empty-state">加载失败</div>';
        }
    }

    function renderCategories(categories) {
        const container = document.getElementById('categoriesTable');
        if (!categories || categories.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无分区</div>';
            return;
        }
        let html = `<table>
            <thead>
                <tr><th>ID</th><th>名称</th><th>排序</th><th>操作</th></tr>
            </thead>
            <tbody>`;
        categories.forEach(c => {
            html += `<tr>
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.sortOrder}</td>
                <td>
                    <button class="btn-warning" onclick="editCategory(${c.id}, '${escapeHtml(c.name)}', ${c.sortOrder})">编辑</button>
                    <button class="btn-danger" onclick="deleteCategory(${c.id})">删除</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function updateCategorySelect(categories) {
        const select = document.getElementById('prodCategory');
        let html = '<option value="0">默认分区</option>';
        categories.forEach(c => {
            html += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
        });
        select.innerHTML = html;
    }

    function showAddCategoryModal() {
        document.getElementById('categoryModalTitle').textContent = '添加分区';
        document.getElementById('editCategoryId').value = '';
        document.getElementById('catName').value = '';
        document.getElementById('catSortOrder').value = '0';
        showModal('categoryModal');
    }

    function editCategory(id, name, sortOrder) {
        document.getElementById('categoryModalTitle').textContent = '编辑分区';
        document.getElementById('editCategoryId').value = id;
        document.getElementById('catName').value = name;
        document.getElementById('catSortOrder').value = sortOrder;
        showModal('categoryModal');
    }

    async function saveCategory() {
        const id = document.getElementById('editCategoryId').value;
        const name = document.getElementById('catName').value.trim();
        const sortOrder = document.getElementById('catSortOrder').value;

        if (!name) {
            showMessage('分区名称不能为空', 'error');
            return;
        }

        const body = `name=${encodeURIComponent(name)}&sortOrder=${encodeURIComponent(sortOrder)}`;
        try {
            let response;
            if (id) {
                response = await authFetch(`/api/admin/categories/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });
            } else {
                response = await authFetch('/api/admin/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });
            }
            const result = await response.json();
            showMessage(result.message, result.success ? 'success' : 'error');
            if (result.success) {
                hideModal('categoryModal');
                loadCategories();
            }
        } catch (e) {
            showMessage('保存失败', 'error');
        }
    }

    async function deleteCategory(id) {
        if (!confirm('确定要删除这个分区吗？该分区下的商品将移到默认分区。')) return;
        try {
            const response = await authFetch(`/api/admin/categories/${id}`, { method: 'DELETE' });
            const result = await response.json();
            showMessage(result.message, result.success ? 'success' : 'error');
            if (result.success) loadCategories();
        } catch (e) {
            showMessage('删除失败', 'error');
        }
    }

    async function loadProducts() {
        try {
            const response = await fetch('/api/products');
            const products = await response.json();
            renderProducts(products);
        } catch (e) {
            document.getElementById('productsTable').innerHTML =
                '<div class="empty-state">加载失败，请刷新重试</div>';
        }
    }

    async function saveProduct() {
        const id = document.getElementById('editProductId').value;
        const categoryId = document.getElementById('prodCategory').value;
        const name = document.getElementById('prodName').value.trim();
        const description = document.getElementById('prodDesc').value.trim();
        const price = document.getElementById('prodPrice').value;
        const stock = document.getElementById('prodStock').value;
        const imagePath = document.getElementById('prodImage').value.trim();
        const fileInput = document.getElementById('prodImageFile');

        if (!name || !price) {
            showMessage('商品名称和价格不能为空', 'error');
            return;
        }

        let finalImagePath = imagePath;

        // 如果选择了新图片，先上传到服务器
        if (fileInput.files && fileInput.files[0]) {
            try {
                const base64 = await fileToBase64(fileInput.files[0]);
                const uploadRes = await authFetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain', 'X-Category-Id': categoryId },
                    body: base64
                });
                const uploadResult = await uploadRes.json();
                if (uploadResult.success) {
                    finalImagePath = uploadResult.url;
                } else {
                    showMessage('图片上传失败: ' + uploadResult.message, 'error');
                    return;
                }
            } catch (e) {
                showMessage('图片上传失败', 'error');
                return;
            }
        }

        const body = `name=${encodeURIComponent(name)}&description=${encodeURIComponent(description)}&price=${encodeURIComponent(price)}&stock=${encodeURIComponent(stock)}&imagePath=${encodeURIComponent(finalImagePath)}&categoryId=${encodeURIComponent(categoryId)}`;

        try {
            let response;
            if (id) {
                response = await authFetch(`/api/admin/products/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });
            } else {
                response = await authFetch('/api/admin/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });
            }
            const result = await response.json();
            showMessage(result.message, result.success ? 'success' : 'error');
            if (result.success) {
                hideModal('productModal');
                loadProducts();
            }
        } catch (e) {
            showMessage('保存失败', 'error');
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

            const result = await response.json();
            showMessage(result.message, result.success ? 'success' : 'error');
            if (result.success) loadOrders();
        } catch (e) {
            showMessage('删除失败', 'error');
        }
    }

    async function shipOrder(orderId) {
        if (!confirm('确定要将该订单标记为派送中吗？')) return;
        try {
            const response = await authFetch(`/api/admin/orders/${orderId}/ship`, { method: 'POST' });
            const result = await response.json();
            showMessage(result.message, result.success ? 'success' : 'error');
            if (result.success) loadOrders();
        } catch (e) {
            showMessage('操作失败', 'error');
        }
    }

    async function deliverOrder(orderId) {
        if (!confirm('确定要将该订单标记为已送达吗？')) return;
        try {
            const response = await authFetch(`/api/admin/orders/${orderId}/deliver`, { method: 'POST' });
            const result = await response.json();
            showMessage(result.message, result.success ? 'success' : 'error');
            if (result.success) loadOrders();
        } catch (e) {
            showMessage('操作失败', 'error');
        }
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function hideModal(id) { document.getElementById(id).classList.remove('active'); }

    function showMessage(text, type) {
        const existing = document.querySelector('.message');
        if (existing) existing.remove();
        const msg = document.createElement('div');
        msg.className = `message ${type}`;
        msg.textContent = text;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;')
                  .replace(/'/g, '&#039;');
    }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('active');
        });
    });

    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') doAdminLogin();
    });

    init();
</script>
</body>
</html>
